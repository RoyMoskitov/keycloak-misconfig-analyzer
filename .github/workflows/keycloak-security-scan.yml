name: Keycloak Security Scan (DAST)

on:
  workflow_dispatch:
    inputs:
      keycloak_url:
        description: 'Keycloak URL (e.g. http://localhost:8180)'
        required: false
        default: 'http://localhost:8180'
      realm:
        description: 'Realm to scan'
        required: false
        default: 'vulnerable-test'
      max_detected:
        description: 'Max allowed DETECTED findings (0 = no limit)'
        required: false
        default: '0'
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    name: Keycloak DAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Keycloak
        run: |
          docker run -d --name keycloak \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=adminpass \
            -e KC_HEALTH_ENABLED=true \
            -e KC_METRICS_ENABLED=true \
            -p 8180:8080 \
            -p 9000:9000 \
            quay.io/keycloak/keycloak:26.0.7 start-dev

          echo "Waiting for Keycloak..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8180/realms/master > /dev/null 2>&1; then
              echo "Keycloak ready after ${i}s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Keycloak failed to start"
              docker logs keycloak
              exit 1
            fi
            sleep 2
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build scanner
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B -q

      - name: Setup vulnerable realm
        run: |
          bash test-environments/setup-vulnerable-realm.sh http://localhost:8180 admin adminpass

      - name: Run security scan
        id: scan
        run: |
          java -jar target/*.jar \
            --keycloak-audit.server-url=http://localhost:8180 \
            --keycloak-audit.realm=${{ github.event.inputs.realm || 'vulnerable-test' }} \
            --keycloak-audit.client-id=admin-cli \
            --keycloak-audit.username=admin \
            --keycloak-audit.password=adminpass \
            --server.port=8080 &
          SCANNER_PID=$!

          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/scan 2>/dev/null)
            if [ "$STATUS" = "405" ] || [ "$STATUS" = "200" ]; then
              echo "Scanner ready (HTTP $STATUS)"
              break
            fi
            sleep 2
          done

          # SARIF export
          curl -sf -X POST http://localhost:8080/api/scan-sarif \
            -H "Content-Type: application/json" \
            -o results.sarif || true

          # JSON export
          curl -sf -X POST http://localhost:8080/api/scan \
            -H "Content-Type: application/json" \
            -o results.json

          kill $SCANNER_PID 2>/dev/null || true

          DETECTED=$(python3 -c "import json; d=json.load(open('results.json')); print(d['summary']['detected'])")
          TOTAL=$(python3 -c "import json; d=json.load(open('results.json')); print(d['summary']['totalChecks'])")
          ERRORS=$(python3 -c "import json; d=json.load(open('results.json')); print(d['summary']['errors'])")
          OK=$(python3 -c "import json; d=json.load(open('results.json')); print(d['summary']['ok'])")

          echo "detected=$DETECTED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT

          echo "## Keycloak Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total checks | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Detected | **$DETECTED** |" >> $GITHUB_STEP_SUMMARY
          echo "| OK | $OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: keycloak-security

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keycloak-scan-results
          path: |
            results.json
            results.sarif

      - name: Check threshold
        if: github.event.inputs.max_detected != '' && github.event.inputs.max_detected != '0'
        run: |
          MAX=${{ github.event.inputs.max_detected }}
          DETECTED=${{ steps.scan.outputs.detected }}
          if [ "$DETECTED" -gt "$MAX" ]; then
            echo "::error::Found $DETECTED issues, threshold is $MAX"
            exit 1
          fi
