name: Keycloak Security Scan (DAST)

on:
  workflow_dispatch:
    inputs:
      keycloak_url:
        description: 'Keycloak URL'
        required: false
        default: 'http://keycloak:8080'
      realm:
        description: 'Realm to scan'
        required: false
        default: 'vulnerable-test'
      max_detected:
        description: 'Max allowed DETECTED findings (0 = no limit)'
        required: false
        default: '0'
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Job 1: Build scanner Docker image
  build-scanner:
    name: Build Scanner Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t keycloak-scanner:latest .

      - name: Save Docker image
        run: docker save keycloak-scanner:latest | gzip > scanner-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanner-image
          path: scanner-image.tar.gz
          retention-days: 1

  # Job 2: Run scan against Keycloak
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-scanner
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download scanner image
        uses: actions/download-artifact@v4
        with:
          name: scanner-image

      - name: Load scanner image
        run: gunzip -c scanner-image.tar.gz | docker load

      - name: Start Keycloak
        run: |
          docker network create scan-net

          docker run -d --name keycloak --network scan-net \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=adminpass \
            -e KC_HEALTH_ENABLED=true \
            -e KC_METRICS_ENABLED=true \
            -p 8180:8080 \
            quay.io/keycloak/keycloak:26.0.7 start-dev

          echo "Waiting for Keycloak..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8180/realms/master > /dev/null 2>&1; then
              echo "Keycloak ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Setup vulnerable realm
        run: bash test-environments/setup-vulnerable-realm.sh http://localhost:8180 admin adminpass

      - name: Run scanner (CLI mode)
        id: scan
        shell: bash {0}
        run: |
          docker run --rm --network scan-net \
            -v $(pwd)/results:/app/results \
            keycloak-scanner:latest \
            --cli \
            --keycloak-audit.server-url=http://keycloak:8080 \
            --keycloak-audit.realm=${{ github.event.inputs.realm || 'vulnerable-test' }} \
            --keycloak-audit.client-id=admin-cli \
            --keycloak-audit.username=admin \
            --keycloak-audit.password=adminpass \
            --output=/app/results/results.json \
            --format=json \
            --spring.main.web-application-type=none \
            2>scanner.log | tee scan-output.txt

          # Also run SARIF export
          docker run --rm --network scan-net \
            -v $(pwd)/results:/app/results \
            keycloak-scanner:latest \
            --cli \
            --keycloak-audit.server-url=http://keycloak:8080 \
            --keycloak-audit.realm=${{ github.event.inputs.realm || 'vulnerable-test' }} \
            --keycloak-audit.client-id=admin-cli \
            --keycloak-audit.username=admin \
            --keycloak-audit.password=adminpass \
            --output=/app/results/results.sarif \
            --format=sarif \
            --spring.main.web-application-type=none \
            2>>scanner.log || true

          # Parse results
          if [ -f results/results.json ]; then
            DETECTED=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['detected'])")
            TOTAL=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['totalChecks'])")
            OK=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['ok'])")
            ERRORS=$(python3 -c "import json; d=json.load(open('results/results.json')); print(d['summary']['errors'])")

            echo "detected=$DETECTED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT

            echo "## Keycloak Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total checks | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Detected | **$DETECTED** |" >> $GITHUB_STEP_SUMMARY
            echo "| OK | $OK |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Scanner failed. Logs:"
            cat scanner.log
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results/results.sarif') != ''
        with:
          sarif_file: results/results.sarif
          category: keycloak-security

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keycloak-scan-results
          path: |
            results/
            scanner.log

      - name: Check threshold
        if: github.event.inputs.max_detected != '' && github.event.inputs.max_detected != '0'
        run: |
          MAX=${{ github.event.inputs.max_detected }}
          DETECTED=${{ steps.scan.outputs.detected }}
          if [ "$DETECTED" -gt "$MAX" ]; then
            echo "::error::Found $DETECTED issues, threshold is $MAX"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop keycloak 2>/dev/null || true
          docker rm keycloak 2>/dev/null || true
          docker network rm scan-net 2>/dev/null || true
