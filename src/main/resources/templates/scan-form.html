<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Keycloak Security Scanner</title><link rel="stylesheet" href="/css/app.css?v=2" th:href="@{/css/app.css?v=2}"></head>
<body>
<nav class="navbar">
    <div class="navbar-logo"><div class="dot"></div>Keycloak Scanner</div>
    <div class="navbar-links"><a href="/" class="active">Scan</a><a href="/history">History</a><a href="/diff">Diff</a><a href="/baselines">Baselines</a></div>
</nav>
<div class="wrap-narrow">
    <div class="form-card">
        <h2>New Security Scan</h2>
        <div class="desc">OWASP ASVS v5 configuration audit for Keycloak</div>
        <form th:action="@{/scan}" th:object="${scanForm}" method="post">
            <div class="field"><label>Server URL</label><input class="input" th:field="*{serverUrl}" placeholder="http://localhost:8180"></div>
            <div class="field"><label>Realm</label><input class="input" th:field="*{realm}" placeholder="master"></div>
            <div class="field"><label>Client ID</label><input class="input" th:field="*{clientId}" placeholder="admin-cli"></div>

            <div class="field"><label>Authentication Method</label>
                <select class="input" th:field="*{grantType}" onchange="toggleAuthFields(this.value)">
                    <option value="password">Username + Password</option>
                    <option value="client_credentials">Client Secret (Service Account)</option>
                </select>
            </div>

            <div id="password-fields">
                <div class="field"><label>Username</label><input class="input" th:field="*{username}" placeholder="admin"></div>
                <div class="field"><label>Password</label><input type="password" class="input" th:field="*{password}" placeholder="Enter password"></div>
            </div>

            <div id="secret-fields" style="display:none">
                <div class="field"><label>Client Secret</label><input type="password" class="input" th:field="*{clientSecret}" placeholder="Enter client secret"></div>
            </div>

            <button type="submit" class="btn-submit">Run Scan</button>
        </form>
    </div>
</div>
<script>
function toggleAuthFields(v) {
    document.getElementById('password-fields').style.display = v === 'password' ? 'block' : 'none';
    document.getElementById('secret-fields').style.display = v === 'client_credentials' ? 'block' : 'none';
}
</script>
</body>
</html>
