<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Keycloak Security Scan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="container" style="max-width: 640px; margin-top: 80px;">
    <div class="card p-4">

        <h4 class="mb-1">Keycloak Security Scan</h4>
        <p class="mb-4 small">
            OWASP misconfiguration check
        </p>

        <form th:action="@{/scan}" th:object="${scanForm}" method="post">

            <div class="mb-3">
                <label>Server URL</label>
                <input class="form-control" th:field="*{serverUrl}">
            </div>

            <div class="mb-3">
                <label>Realm</label>
                <input class="form-control" th:field="*{realm}">
            </div>

            <div class="mb-3">
                <label>Client ID</label>
                <input class="form-control" th:field="*{clientId}">
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input class="form-control" th:field="*{username}">
            </div>

            <div class="mb-4">
                <label>Client Secret</label>
                <input type="password" class="form-control" th:field="*{password}">
            </div>

            <button class="btn btn-primary w-100">
                Run scan
            </button>

        </form>
    </div>
</div>

</body>
</html>
