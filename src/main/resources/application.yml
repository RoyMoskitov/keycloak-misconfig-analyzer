keycloak-audit:
  server-url: http://localhost:8180
  realm: master
  client-id: admin-cli
  username: admin
  password: adminpass

server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/keycloak-scanner;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# External gRPC check modules (uncomment to enable)
